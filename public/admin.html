<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>لوحة الإدارة</title>

<style>
body{
  font-family:Tahoma;
  background:#f3f4f6;
  margin:0;
  padding:20px;
}

.box{
  max-width:1000px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:16px;
}

h1,h2{
  text-align:center;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th,td{
  border:1px solid #ddd;
  padding:12px;
  text-align:center;
}

th{
  background:#111827;
  color:white;
}

.status{
  color:green;
  font-weight:bold;
}

.add-property{
  max-width:1000px;
  margin:25px auto;
  background:white;
  padding:20px;
  border-radius:16px;
}

input,select,button{
  padding:10px;
  margin:5px;
}

button{
  cursor:pointer;
  background:#111827;
  color:white;
  border:none;
  border-radius:8px;
}

.property-card{
  background:#fff;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ddd;
}
</style>

</head>

<body>

<div class="box">

<div style="text-align:center; margin-bottom:20px;">
  <button onclick="window.location.href='/'">الصفحة الرئيسية</button>
</div>

<h1>لوحة الإدارة</h1>

<table>

<thead>
<tr>
<th>رقم الحجز</th>
<th>اسم العميل</th>
<th>الجوال</th>
<th>عدد الساعات</th>
<th>الإجمالي</th>
<th>الحالة</th>
<th>التاريخ</th>
</tr>
</thead>

<tbody id="bookings"></tbody>

</table>

</div>


<div class="add-property">

<h2>إضافة عقار</h2>

<input type="text" id="propertyName" placeholder="اسم العقار">

<select id="propertyType">
<option value="استراحة">استراحة</option>
<option value="شاليه">شاليه</option>
</select>

<input type="number" id="propertyPrice" placeholder="السعر">

<input type="file" id="propertyImage" accept="image/*">

<button onclick="addProperty()">إضافة</button>

<hr>

<div id="propertiesList"></div>

</div>


<script>

async function loadBookings(){

  const res = await fetch("/admin/bookings");
  const data = await res.json();

  const tbody = document.getElementById("bookings");

  if(data.length === 0){

    tbody.innerHTML = `
      <tr>
        <td colspan="7">لا توجد حجوزات حتى الآن</td>
      </tr>
    `;

    return;
  }

  tbody.innerHTML = data.map(b => `
    <tr>
      <td>${b.id}</td>
      <td>${b.customer_name || "-"}</td>
      <td>${b.phone || "-"}</td>
      <td>${b.hours || "-"}</td>
      <td>${b.total || "-"} ريال</td>
      <td class="status">${b.status}</td>
      <td>${new Date(b.created_at).toLocaleString("ar-SA")}</td>
    </tr>
  `).join("");

}



async function addProperty(){

  const name = document.getElementById("propertyName").value;
  const type = document.getElementById("propertyType").value;
  const price = document.getElementById("propertyPrice").value;
  const imageFile = document.getElementById("propertyImage").files[0];

  const formData = new FormData();
  formData.append("name", name);
  formData.append("type", type);
  formData.append("price", price);
  if (imageFile) {
    formData.append("image", imageFile);
  }

  const response = await fetch("/add-property", {
    method: "POST",
    body: formData
  });

  const data = await response.json();

  if (data.success) {
    alert(data.message || "تمت إضافة العقار");
    document.getElementById("propertyName").value = "";
    document.getElementById("propertyPrice").value = "";
    document.getElementById("propertyImage").value = "";
    loadProperties();
  } else {
    alert(data.error || "حدث خطأ أثناء الإضافة");
  }
}



async function loadProperties(){

  const response = await fetch("/properties");
  const properties = await response.json();

  let html = "";

  properties.forEach(property => {

    html += `
      <div class="property-card">

        ${property.image ? `
          <img 
            src="${property.image}" 
            style="
              width:180px;
              border-radius:10px;
              margin-bottom:10px;
            "
          >
        ` : ""}

        <h3>${property.name}</h3>

        <p>${property.type}</p>

        <p>${property.price} ريال</p>

      </div>
    `;

  });

  document.getElementById("propertiesList").innerHTML = html;

}


loadBookings();
loadProperties();

</script>

</body>

</html>
