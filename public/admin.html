<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الإدارة</title>

<style>
body{
  font-family:Tahoma;
  background:#f3f4f6;
  margin:0;
  padding:20px;
}

.box{
  max-width:1000px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:16px;
}

h1{
  text-align:center;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th,td{
  border:1px solid #ddd;
  padding:12px;
  text-align:center;
}

th{
  background:#111827;
  color:white;
}

.status{
  color:green;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
  <h1>لوحة الإدارة</h1>

  <table>
    <thead>
      <tr>
        <th>رقم الحجز</th>
        <th>اسم العميل</th>
        <th>الجوال</th>
        <th>عدد الساعات</th>
        <th>الإجمالي</th>
        <th>الحالة</th>
        <th>التاريخ</th>
      </tr>
    </thead>

    <tbody id="bookings"></tbody>
  </table>
</div>

<script>
async function loadBookings(){
  const res = await fetch("/admin/bookings");
  const data = await res.json();

  const tbody = document.getElementById("bookings");

  if(data.length === 0){
    tbody.innerHTML = `
      <tr>
        <td colspan="7">لا توجد حجوزات حتى الآن</td>
      </tr>
    `;
    return;
  }

  tbody.innerHTML = data.map(b => `
    <tr>
      <td>${b.id}</td>
      <td>${b.customer_name || "-"}</td>
      <td>${b.phone || "-"}</td>
      <td>${b.hours || "-"}</td>
      <td>${b.total || "-"} ريال</td>
      <td class="status">${b.status}</td>
      <td>${new Date(b.created_at).toLocaleString("ar-SA")}</td>
    </tr>
  `).join("");
}

loadBookings();
async function addProperty() {

const name = document.getElementById("propertyName").value;
const type = document.getElementById("propertyType").value;
const price = document.getElementById("propertyPrice").value;
const imageFile = document.getElementById("image").files[0];


const formData = new FormData();

formData.append("name", name);
formData.append("type", type);
formData.append("price", price);
formData.append("image", imageFile);

const response = await fetch("/add-property", {
method: "POST",
body: formData
});

const data = await response.json();

alert("تمت إضافة العقار");

loadProperties();
}

async function loadProperties() {

const response = await fetch("/properties");
const properties = await response.json();

let html = "";

properties.forEach(property => {

html += `
<div style="
background:#fff;
padding:15px;
margin-bottom:10px;
border-radius:10px;
">

<h3>${property.name}</h3>

<p>${property.type}</p>

<p>${property.price} ريال</p>

</div>
`;

});

document.getElementById("propertiesList").innerHTML = html;
}

loadProperties();
<div class="add-property">

<div class="add-property">
</script>
<h2>إضافة عقار</h2>

<input type="text" id="propertyName" placeholder="اسم العقار">

<select id="propertyType">
<option value="استراحة">استراحة</option>
<option value="شاليه">شاليه</option>
</select>

<input type="number" id="propertyPrice" placeholder="السعر">

<input type="file" id="image" accept="image/*">

<button onclick="addProperty()">إضافة</button>

</div>

<hr>

<div id="propertiesList"></div>

</body>

</html>
