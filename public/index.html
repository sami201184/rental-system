<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الإيجار</title>
<style>
body{font-family:tahoma;background:#f3f4f6;padding:40px}
.container{max-width:800px;margin:auto;background:white;padding:30px;border-radius:20px;box-shadow:0 0 15px rgba(0,0,0,.1)}
.tabs{display:flex;gap:10px;margin-bottom:25px}
.tab-btn{flex:1;padding:15px;border:none;border-radius:10px;cursor:pointer;font-size:18px;background:#e5e7eb;color:#111}
.active{background:#0f172a;color:white}
.tab{display:none}.show{display:block}
.card{background:#f9fafb;padding:15px;border-radius:14px;margin-bottom:15px}
input{width:100%;padding:13px;margin:6px 0;border:1px solid #ddd;border-radius:10px}
button{width:100%;padding:13px;border:none;border-radius:10px;background:#16a34a;color:white;font-size:17px;cursor:pointer}
.admin-btn{display:block;margin-top:15px;background:#444;color:white;text-decoration:none;padding:14px;border-radius:10px;text-align:center;font-weight:bold}
</style>
</head>
<body>

<div class="container">
<div class="tabs">
<button class="tab-btn active" onclick="showTab('chalets',this)">الشاليهات</button>
<button class="tab-btn" onclick="showTab('resorts',this)">الاستراحات</button>
</div>

<div id="chalets" class="tab show">
<h2>الشاليهات</h2>
<div id="chaletsList"></div>
</div>

<div id="resorts" class="tab">
<h2>الاستراحات</h2>
<div id="resortsList"></div>
</div>

<a href="/admin-login" class="admin-btn">تسجيل دخول</a>
</div>

<script>
function showTab(id, btn){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("show"));
document.getElementById(id).classList.add("show");
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

async function loadProperties(){
const res = await fetch("/properties");
const data = await res.json();

const chalets = document.getElementById("chaletsList");
const resorts = document.getElementById("resortsList");

chalets.innerHTML = "";
resorts.innerHTML = "";

data.forEach(p=>{
const html = `
<div class="card">
${p.image ? `<img src="${p.image}" style="width:100%;border-radius:14px;margin-bottom:12px;object-fit:cover;" />` : ""}
<h3>${p.name}</h3>
<p>السعر: ${p.price} ريال</p>
<input id="name-${p.id}" placeholder="اسم العميل">
<input id="phone-${p.id}" placeholder="رقم الجوال">
<button onclick="bookProperty(${p.id}, '${p.name}', ${p.price})">حجز</button>
</div>
`;

if(p.type === "شاليه"){
chalets.innerHTML += html;
}else{
resorts.innerHTML += html;
}
});
}

async function bookProperty(id, propertyName, price){
const customer_name = document.getElementById("name-" + id).value;
const phone = document.getElementById("phone-" + id).value;

const res = await fetch("/book",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
customer_name,
phone,
hours:1,
total:price,
status:"معلق"
})
});

const data = await res.json();

if(data.success){
alert("تم حفظ الحجز");
}else{
alert("فشل الحجز");
}
}

loadProperties();
</script>

</body>
</html>
