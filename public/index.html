<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نظام الحجز</title>

<style>

body{
font-family:tahoma;
background:#f3f4f6;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

.tabs{
display:flex;
gap:10px;
margin-bottom:25px;
}

.tab-btn{
flex:1;
padding:15px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:18px;
background:#e5e7eb;
}

.active{
background:#0f172a;
color:white;
}

.tab{
display:none;
}

.show{
display:block;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
background:#16a34a;
color:white;
}
.admin-btn{
display:block;
margin-top:12px;
background:#444;
color:#fff;
text-decoration:none;
padding:14px;
border-radius:10px;
text-align:center;
font-weight:bold;
}
button:hover{
opacity:.9;
}

.total{
font-size:28px;
font-weight:bold;
text-align:center;
margin:20px 0;
}

</style>

</head>
<body>

<div class="container">

<div class="tabs">
<button class="tab-btn active"
onclick="showTab('booking', this)">
الحجز
</button>

<button class="tab-btn"
onclick="showTab('payment', this)">
الدفع
</button>
</div>

<!-- تبويب الحجز -->

<div id="booking" class="tab show">

<h2>بيانات الحجز</h2>

<input type="text"
id="name"
placeholder="اسم العميل">

<input type="text"
id="phone"
placeholder="رقم الجوال">

<input type="number"
id="hours"
placeholder="عدد الساعات"
oninput="calcTotal()">

<div class="total">
الإجمالي:
<span id="total">0</span>
ريال
</div>

<button onclick="saveBooking()">
حفظ الحجز
</button>
<a href="/admin-login" class="admin-btn">
دخول الادمن
</a>
</div>

<!-- تبويب الدفع -->

<div id="payment" class="tab">

<h2>الدفع</h2>

<div class="total">
المبلغ المطلوب:
<span id="paymentTotal">0</span>
ريال
</div>

<button>
دفع الآن
</button>

</div>

</div>

<script>

function showTab(id, btn){

document.querySelectorAll(".tab")
.forEach(tab=>{
tab.classList.remove("show");
});

document.getElementById(id)
.classList.add("show");

document.querySelectorAll(".tab-btn")
.forEach(b=>{
b.classList.remove("active");
});

btn.classList.add("active");

}

function calcTotal(){

const hours =
document.getElementById("hours").value || 0;

const total = hours * 50;

document.getElementById("total")
.innerText = total;

document.getElementById("paymentTotal")
.innerText = total;

}

async function saveBooking(){

const customer_name =
document.getElementById("name").value;

const phone =
document.getElementById("phone").value;

const hours =
document.getElementById("hours").value;

const total =
document.getElementById("total").innerText;

const response = await fetch("/book",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
customer_name,
phone,
hours,
total
})

});

const data = await response.json();

if(data.success){

alert("تم حفظ الحجز بنجاح");

}else{

alert("فشل الحفظ");

}

}

</script>

</body>
</html>
