<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نظام الحجز</title>

<style>

body{
font-family:tahoma;
background:#f4f4f4;
padding:40px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
text-align:center;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#0f172a;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#1e293b;
}

#message{
margin-top:20px;
text-align:center;
font-size:18px;
}

</style>

</head>
<body>

<div class="container">

<h1>حجز استراحة</h1>

<input type="text" id="name" placeholder="اسم العميل">

<input type="text" id="phone" placeholder="رقم الجوال">

<input type="number" id="hours" placeholder="عدد الساعات">

<input type="number" id="total" placeholder="الإجمالي">

<button onclick="saveBooking()">
تأكيد الحجز
</button>

<div id="message"></div>

</div>

<script>

async function saveBooking(){

const customer_name =
document.getElementById("name").value;

const phone =
document.getElementById("phone").value;

const hours =
document.getElementById("hours").value;

const total =
document.getElementById("total").value;

const response = await fetch("/book",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
customer_name,
phone,
hours,
total
})

});

const data = await response.json();

if(data.success){

document.getElementById("message").innerHTML =
"✅ تم الحجز بنجاح";

}else{

document.getElementById("message").innerHTML =
"❌ فشل الحجز";

}

}

</script>

</body>
</html>
